name: release

# Tag-driven release: pushing a vX.Y.Z tag runs glyph notes + GoReleaser (binaries,
# checksums, Homebrew cask) and attaches build-provenance attestations.
# Deliberately NOT on every main push — that would run GoReleaser with no tag.
# Use workflow_dispatch for a manual run.
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write      # create the GitHub release
  id-token: write      # keyless signing for provenance attestation
  attestations: write  # write the attestation

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          # glyph and GoReleaser only READ local git; every write (release,
          # cask push) goes through API tokens passed as env, never git — drop
          # the persisted checkout token (zizmor artipacked). t-yaxa
          persist-credentials: false

      # No job-level `env: GOTOOLCHAIN: local` — see build.yml. It would make
      # setup-go skip go.mod's `toolchain` line and ship release binaries built
      # with the bare floor. setup-go pins GOTOOLCHAIN=local itself.
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: 'go.mod'
          # Release binaries must not be built from a shared, poisonable module
          # cache (zizmor cache-poisoning); PR-time caching stays in build.yml.
          # t-yaxa
          cache: false

      # The pin is a CONCRETE glyph release tag — the action verifies the
      # binary against that release's checksums + build provenance. Keep both
      # versions in lockstep when bumping.
      - name: install glyph
        uses: akira-toriyama/glyph/.github/actions/install@v0.8.0
        with:
          version: v0.8.0
          token: ${{ github.token }}

      - name: generate release notes (glyph)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # The pushed tag sits at HEAD and is already the highest v* tag, so a
          # bare --since-tag (auto = highest tag) would walk an empty range.
          # Name the PREVIOUS version tag as the walk base — glyph's "redo this
          # release" form; a first release (no earlier tag) walks from the root
          # commit instead (an exclusive range bound, so the root itself stays
          # out — acceptable for the one release that has this shape).
          if base="$(git describe --tags --abbrev=0 --match 'v[0-9]*' HEAD^ 2>/dev/null)"; then
            :
          else
            base="$(git rev-list --max-parents=0 HEAD | tail -n 1)"
          fi
          status=0
          glyph notes --since-tag="$base" > "$RUNNER_TEMP/CHANGELOG.md" || status=$?
          if [ "$status" -eq 1 ]; then
            # Soft no-release: nothing since $base classifies release-worthy.
            # The human still cut the tag, so release with an empty body
            # rather than failing the run.
            echo "::notice::glyph found nothing release-worthy since $base — releasing with empty notes."
            : > "$RUNNER_TEMP/CHANGELOG.md"
          elif [ "$status" -ne 0 ]; then
            exit "$status"
          fi

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          # Pin the GoReleaser TOOL to the v2 line (never `latest`).
          version: "~> 2"
          args: release --clean --release-notes ${{ runner.temp }}/CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # PAT with write access to akira-toriyama/homebrew-tap.
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: 'dist/*.tar.gz, dist/checksums.txt'
